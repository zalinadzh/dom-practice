<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" initial-scale="1.0">
        <link rel="stylesheet" href="style.css">
        <title>PROJECT DOM</title>
    </head>
    <body>
        <header>
            <div class="info">

                <div class="header-item">
                    <h3>Контакты</h3>
                    <ul>
                        <li>+7 (999) 000-00-00</li>
                        <li>Адрес: ул.Кофейная, 5</li>
                        <li>cofee@mail.ru</li>
                    </ul>
                </div>
                <div class="header-item">
                    <h3>О нас</h3>
                    <ul>
                        <li>Наша кофейня</li>
                        <li>Наша история</li>
                    </ul>
                </div>
                <div class="header-item">
                    <h3>Каталог</h3>
                    <ul>
                        <li>Эспрессо</li>
                        <li>Капучино</li>
                        <li>Десерты</li>
                    </ul>
                </div>
            </div>
             
        </header>
        <section class="img-section">
            <img src="coffee.jpg" class="divider-line" alt="coffee divider">
            <button class="img-button">ЗАКАЗАТЬ</button>
        </section>

        <main>
            <div class="categories">
                <h2>ТОП КАТЕГОРИИ</h2>
                <p>Лучший выбор покупателей на этой неделе</p>
            </div>
            <div class="top-catalog">
                <article>
                    <img src="espresso.jpg" alt="Espresso Coffee">
                    <button class="img-espresso">ЭСПРЕССО</button>
                </article>
                <article>
                    <img src="latte.jpg" alt="Latte cofee">
                    <button class="img-latte">ЛАТТЕ</button>
                </article>
                <article>
                    <img src="mocha.jpg" alt="Mocha Coffee">
                    <button class="img-mocha">МОККАЧИНО</button>
                </article>
                <article>
                    <img src="raf.jpg" alt="Raf Coffee">
                    <button class="img-raf">РАФ</button>
                </article>
            </div>
        </main>
       

    
       
        
        
    </body>
</html>
